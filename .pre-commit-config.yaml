# 혼살림 pre-commit hook 설정
# 출처: POLICY §14-bis-1 (I1 GitHub 다중 방어)
# 작성: 2026-05-27 세션 #2
#
# 적용: Phase 1 GitHub 저장소 생성 후
#   pip install pre-commit
#   pre-commit install
#
# 옵션 선택 (Phase 1에서 사용자 결정):
#   - gitleaks: 빠름·단순·정규식 기반 [관찰 — 공식 README]
#   - detect-secrets: 정교·entropy 기반·baseline 파일로 false positive 관리 [관찰 — 공식 README]
# 둘 중 하나 선택 후 다른 하나 주석 처리

repos:
  # ─── Secret 스캔 (둘 중 하나 선택) ────────────────────────

  # 옵션 A: gitleaks (V3 백신 차단 — 세션 #2 사용자 환경 충돌로 옵션 B 전환)
  # - repo: https://github.com/gitleaks/gitleaks
  #   rev: v8.18.0
  #   hooks:
  #     - id: gitleaks

  # 옵션 B: detect-secrets (활성 — Python 패키지·V3 충돌 회피)
  # 2026-05-28 세션 #3: v1.4.0 → v1.5.0 (시스템 설치 detect-secrets 1.5.0과 정합·
  # GitLabTokenDetector·OpenAIDetector·IPPublicDetector 등 신규 plugin 미인식 에러 해소)
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']

  # ─── 코드 품질 (BACKEND §10-2) ────────────────────────────

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1024']  # 1MB+ 파일 차단 (이미지는 별도)
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/psf/black
    rev: 24.1.0
    hooks:
      - id: black
        language_version: python3.10

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.13
    hooks:
      - id: ruff
        args: [--fix]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        additional_dependencies: [types-requests, types-PyYAML]
