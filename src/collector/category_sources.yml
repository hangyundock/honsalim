# category_sources.yml — 카테고리별 제품 수집 정의 (세션 #17)
#
# 소비: collector.category_collect (카테고리 단위 수집·정제·티어 분류·연결).
# search_keywords.yml(시나리오·번들용)과 분리 — 이쪽은 "카테고리 1품목"을 실속/고급 2티어로 수집.
#
# ★ 운영자 검토·수정 대상 (§2-마 인간 편집 게이트).
#   라이브 수집 실측으로 검색어·밴드·제외어를 다듬는다 (#16 교훈: 책상 185개 중 114개 오염 → 정제).
#
# 항목:
#   require_any   : 상품명에 적어도 하나는 포함해야 하는 카테고리 핵심어(관련성 1차).
#   exclude_terms : 하나라도 포함하면 제외(액세서리·타카테고리 오염 차단).
#   tiers.budget  : 💰 실속형 — 가볍게 시작. 검색어 + 가격 밴드(KRW).
#   tiers.premium : ⭐ 고급형 — 오래 쓸 본격. (1인가구엔 과한 3티어 프리미엄은 두지 않음, CATEGORY_PAGE §2-7)
#   * 밴드(min/max)는 검색 단계에서 1차 필터 + 라이브 검증으로 카테고리별 적정대 조정.

categories:
  # 사무용 의자 — require_any=[의자]가 너무 넓어 캠핑·화장대·안락·식사 의자 + 쿠션/패드 액세서리까지
  #   끌어옴(세션 #22 가드레일 라이브 적발, 추천6선이 전부 캠핑/외골격 의자였음). 비사무 의자 종류·
  #   액세서리를 제외해 '사무·컴퓨터·게이밍·인체공학 의자'만 남긴다. ※'사무용' 표기로 위장한 캠핑의자가
  #   있어 require_all로는 못 거름 → 제외어가 근본 대책.
  office-chair:
    require_any: [의자]
    exclude_terms: [차량, 자동차, 커버, 방석, 발받침, 발 받침, 바퀴, 부품, 인형, 미니어처, 다리, 후크, 보호, 캐스터, 헤드레스트, 쿠션, 패드, 외골격, 캠핑, 낚시, 야외, 피크닉, 화장, 안락, 리클라이너, 마사지, 식사, 살롱, 라운지, 라운저, 소파, 침대, 자전거, 사이클링, 푸프, 바 의자, 마작]
    tiers:
      budget:  {q: "office chair",           min: 40000,  max: 100000}
      premium: {q: "ergonomic office chair", min: 100000, max: 250000}

  # 컴퓨터 책상 — 세션 #22 라이브 보강: 소파 사이드테이블·미용실 상담책상·식탁·책상패드(테이블보)는
  #   컴퓨터 책상이 아님(가드레일 적발). ※침실/침대 옆 컴퓨터 책상은 정상이라 '침대'는 제외 안 함.
  desk:
    require_any: [책상, 데스크]
    exclude_terms: [스탠드, 홀더, 컵, 송풍기, 진공, 청소기, 클램프, 선풍기, 차량, 자동차, 트레이, 받침, 라이저, 의자, 매트, 마우스, 키보드, 정리함, 충전, 카메라, 거치대, 브래킷, 조명, 스피커, 가방, 인형, 미니어처, 지지대, 모니터암, 소파, 미용실, 식탁, 패드, 테이블보]
    tiers:
      budget:  {q: "small computer desk", min: 30000,  max: 100000}
      premium: {q: "computer desk",       min: 100000, max: 300000}

  # 모니터 받침대 — 세션 #17 첫 자동 등록 테스트 카테고리(시안 없음).
  # 알리 소싱 양호(소형 액세서리, #12). 모니터 '본체'·'암(벽걸이/클램프)'·청소용품은 제외 대상.
  # exclude_terms는 라이브 1차 수집 실측으로 다듬는다(#16 교훈).
  # 받침대(riser)만 — 세션 #22 라이브 보강: '태블릿 스탠드 아이패드'·'캔틸레버 브래킷'(암형)은 받침대가
  #   아님(가드레일 적발). ※'태블릿/휴대폰 홀더가 달린 정상 모니터 라이저'는 보존해야 하므로 '태블릿' 전체를
  #   막지 않고, 태블릿이 주력인 '태블릿 스탠드'·'아이패드'·암형 '캔틸레버'만 제외.
  monitor-stand:
    require_any: [모니터]
    exclude_terms: [청소, 필름, 보호필름, 케이블, 차량, 자동차, 거울, 카메라, 후드, 벽걸이, 암 거치대, 노트북, 키보드, 마우스, 가방, 인형, 미니어처, 스피커, 조명, 보안, 프라이버시, 태블릿 스탠드, 아이패드, 캔틸레버]
    tiers:
      budget:  {q: "monitor riser stand",           min: 5000,  max: 25000}
      premium: {q: "monitor stand storage drawer",  min: 25000, max: 80000}

  # 노트북 거치대 — 세션 #19. ★require_all('타입+대상' 동시)이 근본 필터:
  #   1그룹=노트북 계열 ∧ 2그룹=거치대 계열을 둘 다 가져야 통과 → "노트북"만 언급한 캠핑 테이블은
  #   거치대 그룹 미충족으로 구조적 탈락(테이블/데스크/책상 제외어 불필요).
  #   exclude_terms는 require_all로 못 거르는 것만 최소로: 거치대형이지만 비대상(가방·휴대폰 스탠드 등).
  #   ※테이블·데스크·책상·태블릿은 '데스크탑 스탠드'·'태블릿 겸용' 같은 정상 노트북 스탠드를
  #     잘못 탈락시키므로 제외하지 않는다(과도 제외 = 정상 상품 손실, 세션 #19 실측 교훈).
  laptop-stand:
    require_all:
      - [노트북, 랩탑, 맥북, laptop, macbook]
      - [거치대, 스탠드, 받침, 홀더, 마운트, stand, holder, riser]
    # ※'전화' 추가(세션 #20 운영자 결정): '전화·태블릿 겸용' 폰 스탠드가 노트북 거치 가능을 이유로 1위로 잡힘
    #   → 카테고리 의도(노트북 전용)에 맞게 제외. (태블릿은 정상 겸용 손실 우려로 여전히 제외 안 함)
    exclude_terms: [가방, 파우치, 슬리브, 케이스, 쿨러, 쿨링, 충전, 어댑터, 도크, 허브, 키보드, 마우스, 거울, 차량, 자동차, 카메라, 인형, 미니어처, 보호필름, 스킨, 청소, 휴대폰, 전화]
    tiers:
      budget:  {q: "foldable laptop stand",           min: 4000,  max: 25000}
      premium: {q: "aluminum laptop stand adjustable", min: 25000, max: 70000}

  # 모니터암 — 세션 #19. 받침대(riser)와 구분: 거치 암/마운트만. 받침대·라이저·서랍형·벽걸이 TV 제외.
  # require_any=[모니터] + q="monitor arm"로 암 편향. 라이브 실측으로 제외어 보강.
  monitor-arm:
    require_any: [모니터]
    exclude_terms: [받침대, 라이저, 서랍, 청소, 필름, 보호필름, 케이블, 차량, 자동차, 카메라, 노트북, 키보드, 마우스, 가방, 인형, 미니어처, 스피커, 조명, 프라이버시, 보안, TV, 텔레비전]
    tiers:
      budget:  {q: "single monitor arm desk mount", min: 8000,  max: 30000}
      premium: {q: "gas spring monitor arm",         min: 30000, max: 90000}

  # ── 1인 살림 확장 (세션 #20) — 네이버 실측 기반 선별(고볼륨·중간경쟁·알리적합 비가전) ──
  #   "1인 ○○" 키워드는 빈약(1인냄비 350) → 대표어로 잡고 1인은 콘텐츠 앵글+보조키워드.
  #   라이브 실측으로 제외어 보강(#16 교훈).

  # 도마 — 알리 쿡웨어 최적. 라이브 실측(세션 #20)으로 보강:
  #   정리대·랙·걸이·선반=수납기구(도마 아님), 도포기=관리도구, 샤퀴테리·치즈·플래터·선물·각인=혼수/접대(1인 비대상).
  cutting-board:
    require_any: [도마]
    exclude_terms: [칼갈이, 칼블럭, 수세미, 행주, 거치대, 받침, 정리대, 랙, 걸이, 선반, 도포기, 커버, 인형, 미니어처, 차량, 자동차, 비누, 식품건조, 음식물, 샤퀴테리, 치즈, 플래터, 선물, 결혼, 약혼, 각인, 맞춤, 캠핑, 할로윈, 추수감사절]
    tiers:
      budget:  {q: "plastic cutting board kitchen", min: 3000,  max: 18000}
      premium: {q: "wood cutting board",             min: 18000, max: 70000}

  # 빨래건조대 — 그릇건조대·식품건조기·신발건조 오염 제외.
  #   라이브 실측(세션 #22) 보강: '아기 옷건조대+유아 소변기/기저귀 홀더' 다기능 상품(본질=아기변기) 제외.
  drying-rack:
    require_any: [건조대]
    exclude_terms: [그릇, 식기, 음식, 식품, 건조기, 신발, 과일, 낚시, 빨래집게, 집게, 커버, 차량, 자동차, 인형, 미니어처, 소변기, 기저귀, 변기]
    tiers:
      budget:  {q: "foldable laundry drying rack",              min: 8000,  max: 35000}
      premium: {q: "stainless steel clothes drying rack stand", min: 35000, max: 90000}

  # 미니제습기 — 소형 전기 제습기만. 비전기 제습제·차량용·필터 제외.
  #   라이브 실측(세션 #22) 보강: 산업용·상업용·컴프레서형(대형, '미니' 세그먼트 이탈) 제외.
  mini-dehumidifier:
    require_any: [제습기, 제습]
    exclude_terms: [제습제, 습기제거제, 필터, 부품, 차량, 자동차, 신발, 옷장용, 인형, 미니어처, 실리카겔, 산업용, 상업용, 컴프레서]
    tiers:
      budget:  {q: "mini dehumidifier",       min: 10000, max: 40000}
      premium: {q: "small dehumidifier home", min: 40000, max: 90000}

  # 미니 전기밥솥 — 세션 #36 provision-category(자동 프로비저닝) 첫 라이브 생성 카테고리.
  #   ★require_any=[] : 관련성 정밀 판정은 수집 시 비전 게이트(vision_relevance)가 이미 수행(#36 설계).
  #   자동 수집 상품은 이름이 제각각(밥솥·압력솥·멀티쿠커·핫팟)이라 단일 키워드로 못 묶음 → 비전이 전담.
  #   가드레일 휴리스틱은 명백한 제외어(인형집 미니어처 등)만 적용. 라이브 실측으로 추후 다듬음(§2-마).
  mini-rice-cooker:
    require_any: []
    exclude_terms: [미니어처, 인형, 하우스 장식, 마이크로 풍경, 도시락통, 전기찜기, 슬로우쿠커]
    tiers:
      budget:  {q: "mini rice cooker",                min: 15000, max: 45000}
      premium: {q: "small smart rice cooker 1-2 cups", min: 45001, max: 120000}
