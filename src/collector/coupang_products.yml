# 쿠팡 파트너스 수동 상품 (API 미사용 — 최종승인 전 부트스트랩, collector.coupang).
#
# 쿠팡 Open API는 최종승인(누적 판매 15만원) 후에야 열린다 [확정 — 쿠팡 FAQ].
# 승인 전에는 운영자가 파트너스 '링크 생성'으로 만든 딥링크를 여기에 기록하고,
# `collect-coupang`이 products(source='coupang') + category_products로 적재한다.
#
# 규칙(§0 진실성·안전):
#  - 가짜 후기·평점·판매량 금지 → 쿠팡은 알리 같은 sales_volume/evaluate_rate 신호가 없으므로 비움.
#  - 가격은 '확인 시점' 기준(변동 가능). 숫자 박제 금지 — 렌더러가 변동 안내를 함께 표기.
#  - 이미지(image_url): 쿠팡 '링크 생성 → 상품 링크 → 블로그용(a 태그) HTML'이 제공하는 공식 이미지
#    URL만 넣는다(임베드 정식 사용). 쿠팡 상품 페이지에서 다운로드·스크랩은 금지(§9 함정3).
#    비우면 카드는 텍스트로 표시(이미지 깨져도 graceful degrade).
#  - category 는 categories.slug 와 일치해야 한다(db seed 필요).
#  - coupang_url 은 파트너스 딥링크(link.coupang.com/a/<코드>). 코드가 source_product_id·slug(cp-<코드>)가 된다.

