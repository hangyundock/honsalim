# .github/workflows/build.yml — 배포 워크플로 (방법 A 무인 자동 배포)
# 출처: ARCH §8-2 + DECISIONS B2·B3·H1 [확정] + 세션 #13 재설계.
#
# 트리거: main 브랜치 push (콘텐츠 승인 후 Claude가 build/site 커밋·push)
# 동작: test 게이트 → 커밋된 build/site 검증 → Cloudflare Pages 배포
#
# 핵심: 글 데이터(DB)는 로컬 전용(§11)이라 CI에서 빌드하지 않는다.
#       Claude가 로컬에서 빌드·커밋한 build/site(공개 HTML)를 CI가 업로드만 한다.
#
# Repository Secrets (Phase 1 사용자 설정): CF_API_TOKEN, CF_ACCOUNT_ID

name: build-and-deploy

on:
  push:
    branches: [main]
  workflow_dispatch:  # 수동 트리거

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests (배포 게이트 — 회귀 100% 통과 의무)
        run: pytest --maxfail=1

      - name: Verify committed build artifacts
        run: |
          test -f build/site/index.html
          test -f build/site/sitemap.xml
          test -f build/site/robots.txt
          test -f build/site/_headers
        # build/site는 Claude가 로컬 빌드·커밋한 공개 산출물 (CI 재빌드 없음)

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4  # [관찰] 공식 액션
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          # --commit-message/--commit-dirty 명시: wrangler가 git 커밋 메시지를 CF 배포 메타데이터로
          # 보낼 때, 우리 커밋 규칙의 한국어·특수문자(★ → 등)를 CF API가 거부함(code 8000111,
          # "Invalid commit message ... valid UTF-8"). 안전한 ASCII 메시지로 고정해 전 배포에서 차단(세션 #20).
          command: pages deploy build/site --project-name=honsalim --branch=main --commit-dirty=true --commit-message=honsalim-auto-deploy
        # --branch=main → 프로덕션 배포 (honsalim.com). 콘텐츠 승인(§2-마) 후에만 push.
